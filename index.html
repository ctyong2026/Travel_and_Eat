<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Manager</title>
  <style>
    :root{
      --bg:#f7f8fb;
      --panel:#ffffff;
      --panel-2:#f2f4f8;
      --text:#1f2937;
      --muted:#64748b;
      --line:#dbe1ea;
      --accent:#f97316;
      --accent-2:#0ea5e9;
      --shadow:0 14px 36px rgba(15,23,42,.08);
      --radius:18px;
    }
    html[data-theme="dark"]{
      --bg:#0f172a;
      --panel:#111827;
      --panel-2:#1f2937;
      --text:#f8fafc;
      --muted:#94a3b8;
      --line:#334155;
      --shadow:0 18px 42px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    a{color:inherit;text-decoration:none}
    .gate{
      position:fixed;
      inset:0;
      z-index:50;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:22px;
      background:linear-gradient(135deg,#fff7ed,#f8fafc 48%,#e0f2fe);
    }
    html[data-theme="dark"] .gate{background:linear-gradient(135deg,#111827,#0f172a 58%,#1e293b)}
    .gate[hidden]{display:none!important}
    .gate-card{
      width:min(420px,100%);
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:28px;
      text-align:center;
    }
    .gate-logo{
      width:86px;
      height:86px;
      border-radius:50%;
      margin:0 auto 14px;
      overflow:hidden;
      border:3px solid var(--panel);
      box-shadow:0 12px 28px rgba(15,23,42,.20);
      background:var(--panel-2);
    }
    .gate-logo img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .gate h1{font-size:24px;margin:0 0 8px}
    .gate p{margin:0 0 18px;color:var(--muted);line-height:1.5}
    .pw-row{display:flex;gap:8px;background:var(--panel-2);border:1px solid var(--line);padding:7px;border-radius:16px}
    .pw-row input{min-width:0;flex:1;border:0;background:transparent;color:var(--text);outline:0;padding:12px;font-size:15px}
    .pw-row button{border:0;border-radius:12px;background:var(--text);color:var(--panel);font-weight:800;padding:0 16px;cursor:pointer}
    .error{height:20px;margin-top:12px;color:#ef4444;font-size:14px}

    .app{max-width:980px;margin:0 auto;padding:26px 18px 48px}
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
    }
    .brand{display:flex;align-items:center;gap:14px;min-width:0}
    .profile{
      position:relative;
      width:58px;
      height:58px;
      border-radius:50%;
      overflow:hidden;
      flex:0 0 auto;
      border:2px solid var(--panel);
      box-shadow:0 8px 22px rgba(15,23,42,.16);
      background:linear-gradient(135deg,#fed7aa,#fde68a);
      display:grid;
      place-items:center;
      color:#7c2d12;
      font-weight:900;
    }
    .profile img{width:100%;height:100%;object-fit:cover;display:block}
    .brand h1{font-size:22px;margin:0;letter-spacing:-.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .brand p{margin:4px 0 0;color:var(--muted);font-size:13px}
    .theme-btn{
      width:46px;
      height:46px;
      border-radius:50%;
      border:1px solid var(--line);
      background:var(--panel);
      color:var(--text);
      box-shadow:var(--shadow);
      cursor:pointer;
      font-size:20px;
      display:grid;
      place-items:center;
    }
    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .toolbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      background:var(--panel);
    }
    .crumb{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:14px}
    .crumb b{color:var(--text)}
    .search{min-width:220px;max-width:320px;width:35%;position:relative}
    .search input{
      width:100%;
      border:1px solid var(--line);
      background:var(--panel-2);
      color:var(--text);
      border-radius:999px;
      padding:10px 14px 10px 36px;
      outline:0;
    }
    .search span{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted)}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th,td{padding:13px 16px;border-bottom:1px solid var(--line);text-align:left;vertical-align:middle}
    th{
      font-size:12px;
      color:var(--muted);
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.06em;
      user-select:none;
      cursor:pointer;
      background:var(--panel-2);
    }
    th .sort{opacity:.45;margin-left:6px;font-size:11px}
    tr:last-child td{border-bottom:0}
    tbody tr:hover{background:var(--panel-2)}
    .name-cell{display:flex;align-items:center;gap:11px;font-weight:700}
    .file-icon{
      width:28px;
      height:28px;
      border-radius:8px;
      display:grid;
      place-items:center;
      background:#fff7ed;
      border:1px solid #fed7aa;
      flex:0 0 auto;
      font-size:17px;
    }
    html[data-theme="dark"] .file-icon{background:#312e24;border-color:#7c2d12}
    .type-text{color:var(--muted);font-size:13px;font-weight:600}
    .open-btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:7px 10px;font-size:12px;font-weight:800;background:var(--panel);color:var(--text)}
    .open-btn:hover{border-color:var(--accent);color:var(--accent)}
    .note{color:var(--muted);font-size:12px;line-height:1.45;padding:14px 16px;border-top:1px solid var(--line);background:var(--panel-2)}
    .empty{display:none;padding:28px;text-align:center;color:var(--muted)}
    .footer{margin-top:14px;color:var(--muted);font-size:12px;text-align:center}
    @media(max-width:720px){
      .topbar{align-items:flex-start}.brand h1{white-space:normal}.toolbar{display:block}.search{width:100%;max-width:none;margin-top:12px}
      th:nth-child(2),td:nth-child(2),th:nth-child(3),td:nth-child(3){display:none}
      th,td{padding:13px 12px}.app{padding-left:12px;padding-right:12px}
    }
  </style>
</head>

      }
    }

    function renderFiles(){
      const query = document.getElementById('searchInput').value.trim().toLowerCase();
      const tbody = document.getElementById('fileBody');
      const empty = document.getElementById('emptyState');
      let list = files.filter(f => (f.name + ' ' + f.type).toLowerCase().includes(query));

      list.sort((a,b) => {
        let av = sortKey === 'date' ? new Date(a.date).getTime() : String(a[sortKey] || '').toLowerCase();
        let bv = sortKey === 'date' ? new Date(b.date).getTime() : String(b[sortKey] || '').toLowerCase();
        if(av < bv) return sortDir === 'asc' ? -1 : 1;
        if(av > bv) return sortDir === 'asc' ? 1 : -1;
        return 0;
      });

      tbody.innerHTML = list.map(f => `
        <tr>
          <td><a class="name-cell" href="${f.file}"><span class="file-icon">${f.icon}</span><span>${f.name}</span></a></td>
          <td data-value="${f.date}">${f.displayDate}</td>
          <td><span class="type-text">${f.type}</span></td>
          <td><a class="open-btn" href="${f.file}" target="_blank" rel="noopener">Open ↗</a></td>
        </tr>
      `).join('');
      empty.style.display = list.length ? 'none' : 'block';
      document.querySelectorAll('th .sort').forEach(s => s.textContent = '↕');
      const active = document.querySelector(`th[data-key="${sortKey}"] .sort`);
      if(active) active.textContent = sortDir === 'asc' ? '↑' : '↓';
    }

    document.querySelectorAll('th[data-key]').forEach(th => {
      th.addEventListener('click', () => {
        const key = th.dataset.key;
        if(key === 'action') return;
        if(sortKey === key) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        else { sortKey = key; sortDir = 'asc'; }
        renderFiles();
      });
    });

    document.getElementById('searchInput').addEventListener('input', renderFiles);
    document.getElementById('unlockBtn').addEventListener('click', unlock);
    document.getElementById('passwordInput').addEventListener('keydown', e => { if(e.key === 'Enter') unlock(); });

    if(sessionStorage.getItem(SESSION_KEY) === '1'){
      document.getElementById('gate').hidden = true;
      document.getElementById('content').hidden = false;
      renderFiles();
    }else{
      setTimeout(() => document.getElementById('passwordInput').focus(), 250);
    }
  </script>
</body>
</html>
